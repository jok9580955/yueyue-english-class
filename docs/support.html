<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>钥钥的英语课 - 技术支持</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.7; max-width: 760px; margin: 0 auto; padding: 32px 20px; color: #182026; background: #f6fbfb; }
    h1, h2 { line-height: 1.25; color: #1f4e5f; }
    .card { background: #fff; border: 1px solid #dbe9ea; border-radius: 8px; padding: 20px; }
    a { color: #0f6f7d; }
  </style>
</head>
<body>
  <h1>钥钥的英语课技术支持</h1>
  <div class="card">
    <p>感谢使用钥钥的英语课。如果你在使用过程中遇到问题，可以参考以下说明。</p>
    <h2>常见问题</h2>
    <p><strong>听不到发音：</strong>请确认设备音量已打开，静音模式不会影响所有机型上的系统语音表现。</p>
    <p><strong>宝宝名字显示不对：</strong>请进入家长中心修改宝宝名字。留空时会恢复默认“钥钥的英语课”。</p>
    <p><strong>iPad 显示方式不同：</strong>iPad 会自动使用更适合大屏陪学的分栏布局，这是正常表现。</p>
    <h2>联系我们</h2>
    <p>如需技术支持，请在 App Store 评价中描述问题，或联系开发者提供设备型号、系统版本和问题页面。</p>
  </div>
</body>
